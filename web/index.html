<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GlobeStreak - a no-API geography guessing game.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GlobeStreak</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #07111F;
    }

    body {
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(0, 174, 239, 0.18), transparent 34%),
        #07111F;
      color: #F7FBFF;
    }

    .loader-content {
      display: grid;
      justify-items: center;
      gap: 14px;
    }

    .loader-globe {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 3px solid rgba(247, 251, 255, 0.68);
      background:
        linear-gradient(90deg, transparent 47%, rgba(247, 251, 255, 0.32) 49%, rgba(247, 251, 255, 0.32) 51%, transparent 53%),
        linear-gradient(0deg, transparent 47%, rgba(247, 251, 255, 0.24) 49%, rgba(247, 251, 255, 0.24) 51%, transparent 53%),
        radial-gradient(circle at 35% 30%, #00AEEF, #075A9A 70%);
      box-shadow: 0 0 34px rgba(0, 174, 239, 0.28);
      animation: loader-spin 1.2s linear infinite;
    }

    .loader-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .loader-status {
      color: rgba(247, 251, 255, 0.72);
      font-size: 14px;
    }

    @keyframes loader-spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div class="app-loader" aria-live="polite" aria-label="Loading GlobeStreak">
    <div class="loader-content">
      <div class="loader-globe"></div>
      <div class="loader-title">GlobeStreak</div>
      <div class="loader-status">Loading world data...</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
